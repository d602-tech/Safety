<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工安查核管理系統 v5.0 (GitHub Pages)</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <!-- 導覽列 -->
    <header class="top-nav">
        <div class="logo">工安查核系統 <span>v5.0</span></div>
        <div class="user-info" style="display: flex; align-items: center; gap: 12px;">
            <span id="userNameDisplay">尚未登入</span>
            <!-- Google 登入按鈕容器 -->
            <div id="googleLoginBtn"></div>
            <button id="logoutBtn" class="btn btn-outline hidden" onclick="app.logout()">登出</button>
        </div>
    </header>

    <!-- 儀表板 stats -->
    <section class="dashboard">
        <div class="stat-card" data-filter="all" onclick="app.setQuickFilter('all')">
            <div class="title">總案件</div>
            <div class="value" id="stat-total">0</div>
        </div>
        <div class="stat-card" data-filter="active" onclick="app.setQuickFilter('active')">
            <div class="title">進行中</div>
            <div class="value" id="stat-active">0</div>
        </div>
        <div class="stat-card warning" data-filter="overdue" onclick="app.setQuickFilter('overdue')">
            <div class="title">已逾期</div>
            <div class="value" id="stat-overdue">0</div>
        </div>
        <div class="stat-card success" data-filter="closed" onclick="app.setQuickFilter('closed')">
            <div class="title">已結案</div>
            <div class="value" id="stat-closed">0</div>
        </div>
    </section>

    <!-- 控制區塊：篩選與新增 -->
    <section class="controls">
        <div class="filters">
            <select id="filterDepartment" onchange="app.renderTable()">
                <option value="">所有主辦部門</option>
            </select>
            <select id="filterStatus" onchange="app.renderTable()">
                <option value="">所有狀態</option>
                <option value="第1階段-已登錄">第1階段</option>
                <option value="第2階段-改善單已上傳">第2階段</option>
                <option value="第3階段-工作隊版已處理">第3階段</option>
                <option value="第4階段-已結案">第4階段</option>
            </select>
            <button class="btn btn-outline" onclick="app.clearFilters()">清除篩選</button>
        </div>
        <div class="actions">
            <button id="btnNewCase" class="btn btn-primary hidden" onclick="app.openNewCaseModal()">+ 登錄新案件</button>
            <button id="btnRemind" class="btn btn-warning hidden" onclick="app.triggerManualRemind()">手動稽催</button>
        </div>
    </section>

    <!-- 案件列表 -->
    <main class="case-list-container">
        <div id="loading" class="loading hidden" style="text-align:center; padding: 20px;">載入中...請稍候</div>
        <table class="case-table" id="caseTable">
            <thead>
                <tr>
                    <th>工程簡稱</th>
                    <th>承攬商</th>
                    <th>主辦部門</th>
                    <th>查核日期</th>
                    <th>最晚核章日</th>
                    <th>辦理狀態</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="caseListBody">
                <tr><td colspan="7" style="text-align:center;">請先完成 Google 登入</td></tr>
            </tbody>
        </table>
    </main>

    <!-- 共用模態框 -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
               <h3 id="modalTitle">操作</h3>
               <button class="close-btn" onclick="app.closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 動態內容注入 -->
            </div>
            <div id="modalLoading" class="hidden" style="text-align:center; margin-top:10px; color:var(--primary);">
                處理中，請稍候...
            </div>
        </div>
    </div>

    <!-- Github Action 動態產生之變數檔 -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
